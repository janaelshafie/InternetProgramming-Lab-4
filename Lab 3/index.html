<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">

            <button class="btn function" data-action="clear">AC</button>
            <button class="btn function" data-value="00">00</button>
            <button class="btn function" data-value="%">&percnt;</button>
            <button class="btn operator" data-value="/">&divide;</button>

            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-value="*">&times;</button>

            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-value="-">&minus;</button>

            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-value="+">&plus;</button>

            <button class="btn number zero" data-value="0">0</button>
            <button class="btn number" data-value=".">&dot;</button>
            <button class="btn equal" data-action="calculate">&equals;</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
